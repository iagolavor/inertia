services:
  inertia-relay:
    build:
      context: ../..
      dockerfile: docker/relay/Dockerfile
    ports:
      - "9000:9000"
    environment:
      INERTIA_RELAY_ADDR: "0.0.0.0:9000"
      INERTIA_RELAY_DATA_DIR: "/data"
      RUST_LOG: "inertia_relay=info,libp2p=info"
    volumes:
      - relay-data:/data
    restart: unless-stopped

volumes:
  relay-data:
