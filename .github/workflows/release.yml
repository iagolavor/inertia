name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  build-windows-zip:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build API (release)
        run: cargo build --release -p inertia-api

      - name: Build web UI
        run: npm ci --prefix apps/web && npm run build --prefix apps/web

      - name: Package Windows zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          powershell -ExecutionPolicy Bypass -File scripts/package-windows.ps1 -Tag $tag

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/inertia-windows-x64.zip
          if-no-files-found: error

  build-windows-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/package-lock.json

      - name: Sync desktop version from tag
        shell: bash
        run: node scripts/sync-desktop-version.mjs "${{ github.ref_name }}"

      - name: Build Windows NSIS installer
        shell: bash
        run: npm run desktop:build -- --bundles nsis

      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p dist/release
          shopt -s nullglob
          files=(apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No NSIS setup.exe under bundle/nsis/" >&2
            ls -laR apps/desktop/src-tauri/target/release/bundle || true
            exit 1
          fi
          cp -f "${files[0]}" "dist/release/Inertia-${VERSION}-windows-x64-setup.exe"
          ls -la dist/release/

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop
          path: dist/release/Inertia-*-windows-x64-setup.exe
          if-no-files-found: error

  build-linux-desktop:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            rpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/package-lock.json

      - name: Sync desktop version from tag
        run: node scripts/sync-desktop-version.mjs "${{ github.ref_name }}"

      - name: Build Linux RPM and AppImage
        run: npm run desktop:build -- --bundles rpm,appimage

      - name: Stage release assets
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p dist/release
          shopt -s nullglob
          rpms=(apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm)
          apps=(apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage)
          if [[ ${#rpms[@]} -eq 0 || ${#apps[@]} -eq 0 ]]; then
            echo "Missing rpm or AppImage under bundle/" >&2
            ls -laR apps/desktop/src-tauri/target/release/bundle || true
            exit 1
          fi
          cp -f "${rpms[0]}" "dist/release/Inertia-${VERSION}-linux-x86_64.rpm"
          cp -f "${apps[0]}" "dist/release/Inertia-${VERSION}-linux-x86_64.AppImage"
          ls -la dist/release/

      - name: Upload Linux desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: |
            dist/release/Inertia-*-linux-x86_64.rpm
            dist/release/Inertia-*-linux-x86_64.AppImage
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: '26.3.11579264'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" > apps/web/android/local.properties
          echo "ANDROID_HOME=${ANDROID_HOME}"
          ls -la "${ANDROID_HOME}/ndk/${NDK_VERSION}" | head

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Sync Android version from tag
        run: node scripts/sync-android-version.mjs "${{ github.ref_name }}"

      - name: Build Stage B package (API + web + Cap sync)
        run: npm ci --prefix apps/web && npm run android:install

      - name: Assemble debug APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Stage release asset
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p dist/release
          src="apps/web/android/app/build/outputs/apk/debug/app-debug.apk"
          dest="dist/release/Inertia-${VERSION}-android-arm64-debug.apk"
          if [[ ! -f "$src" ]]; then
            echo "Missing APK at $src" >&2
            find apps/web/android/app/build/outputs -type f -name '*.apk' || true
            exit 1
          fi
          cp -f "$src" "$dest"
          ls -la dist/release/

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/release/Inertia-*-android-arm64-debug.apk
          if-no-files-found: error

  publish:
    needs: [build-windows-zip, build-windows-desktop, build-linux-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/inertia-windows-x64.zip
            release-assets/Inertia-*-windows-x64-setup.exe
            release-assets/Inertia-*-linux-x86_64.rpm
            release-assets/Inertia-*-linux-x86_64.AppImage
            release-assets/Inertia-*-android-arm64-debug.apk
