<!doctype html>
<html lang="en" data-palette="midnight" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#08090c" />
    <meta name="description" content="Inertia — ephemeral P2P social network" />
    <title>Inertia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('inertia-appearance');
          if (raw) {
            var appearance = JSON.parse(raw);
            if (appearance.palette === 'sandstone' || appearance.palette === 'midnight') {
              document.documentElement.setAttribute('data-palette', appearance.palette);
            }
            if (appearance.mode === 'light' || appearance.mode === 'dark') {
              document.documentElement.setAttribute('data-theme', appearance.mode);
            }
            return;
          }
          var legacy = localStorage.getItem('inertia-theme');
          if (legacy === 'light' || legacy === 'dark') {
            document.documentElement.setAttribute('data-palette', 'midnight');
            document.documentElement.setAttribute('data-theme', legacy);
          }
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
