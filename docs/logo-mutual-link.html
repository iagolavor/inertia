<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inertia — Mutual Link Variations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Sans:wght@400;600;700&family=Inter:wght@400;500;700&family=Lora:wght@500;700&family=Manrope:wght@500;700&family=Nunito:wght@600;800&family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@500;700&family=Sora:wght@500;600;700&family=Space+Grotesk:wght@500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --page-bg: #0a0c10;
      --card-bg: #12151c;
      --border: #252a36;
      --text: #e8eaed;
      --muted: #8b919a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 2rem 1.25rem 4rem;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--page-bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap { max-width: 1200px; margin: 0 auto; }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.85rem;
      letter-spacing: -0.04em;
      margin: 0 0 0.4rem;
    }

    .intro {
      color: var(--muted);
      max-width: 65ch;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.1rem;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--card-bg);
    }

    .meta {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .meta h2 {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .meta p {
      margin: 0.2rem 0 0;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .previews {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .pane {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 118px;
      padding: 1.25rem 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--gap, 0.65rem);
      flex-direction: var(--dir, row);
    }

    .word {
      font-family: var(--font);
      font-weight: var(--weight, 700);
      font-size: var(--size, 1.55rem);
      letter-spacing: var(--track, -0.04em);
      color: var(--word-color);
      text-transform: var(--case, none);
      font-style: var(--style, normal);
      line-height: 1.1;
    }

    .pill {
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: var(--pill-bg, transparent);
    }

    svg.mark { flex-shrink: 0; display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Mutual Link — 20 Variations</h1>
    <p class="intro">
      Based on concept <strong>03 — Mutual link</strong> (two peers, direct P2P, mutual consent).
      Each row shows the same idea on a dark and light background. Mix typography, palette, and mark weight.
    </p>

    <div class="grid" id="grid"></div>
  </div>

  <script>
    /** @typedef {{ id: number, name: string, note: string, font: string, dark: object, light: object, mark: (colors: object) => string, gap?: string, dir?: string, size?: string, weight?: string, track?: string, case?: string, style?: string, pill?: boolean }} Variation */

    /** @param {object} c */
    function baseMark(c) {
      return `<svg class="mark" width="48" height="36" viewBox="0 0 48 36" aria-hidden="true">
        <circle cx="14" cy="18" r="8" fill="none" stroke="${c.ring}" stroke-width="${c.sw ?? 2}"/>
        <circle cx="34" cy="18" r="8" fill="none" stroke="${c.ring}" stroke-width="${c.sw ?? 2}"/>
        <line x1="22" y1="18" x2="26" y2="18" stroke="${c.link}" stroke-width="${c.lw ?? 2}" stroke-linecap="round"/>
      </svg>`;
    }

    const variations = [
      {
        id: 1, name: '01 — Canonical', note: 'Default Inertia palette · DM Sans',
        font: "'DM Sans', sans-serif",
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#3b6fd9', link: '#2f9e44' },
        mark: (c) => baseMark(c)
      },
      {
        id: 2, name: '02 — Featherweight', note: 'Thin strokes · Inter · airy',
        font: "'Inter', sans-serif", weight: '500', size: '1.45rem',
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66', sw: 1.25, lw: 1.5 },
        light: { bg: '#fafbfc', word: '#1a1d27', ring: '#5c7ec9', link: '#38a169', sw: 1.25, lw: 1.5 },
        mark: (c) => baseMark(c)
      },
      {
        id: 3, name: '03 — Bold block', note: 'Heavy Outfit · thick rings',
        font: "'Outfit', sans-serif", weight: '800', size: '1.6rem', track: '-0.03em',
        dark: { bg: '#0a0a0c', word: '#fff', ring: '#6c9eff', link: '#51cf66', sw: 2.75, lw: 3 },
        light: { bg: '#fff', word: '#111', ring: '#2563eb', link: '#16a34a', sw: 2.75, lw: 3 },
        mark: (c) => baseMark(c)
      },
      {
        id: 4, name: '04 — Monochrome dark', note: 'White on black · Space Grotesk',
        font: "'Space Grotesk', sans-serif", weight: '700',
        dark: { bg: '#000', word: '#fff', ring: '#fff', link: '#fff', sw: 1.75, lw: 2 },
        light: { bg: '#f0f0f0', word: '#000', ring: '#000', link: '#000', sw: 1.75, lw: 2 },
        mark: (c) => baseMark(c)
      },
      {
        id: 5, name: '05 — Editorial serif', note: 'Lora + geometric mark contrast',
        font: "'Lora', serif", weight: '700', size: '1.5rem', track: '-0.02em',
        dark: { bg: '#141210', word: '#f5f0e8', ring: '#c4a882', link: '#7cb87c' },
        light: { bg: '#faf8f5', word: '#2c2419', ring: '#8b6914', link: '#2d6a4f' },
        mark: (c) => baseMark(c)
      },
      {
        id: 6, name: '06 — Filled nodes', note: 'Solid circles · hollow bridge',
        font: "'Plus Jakarta Sans', sans-serif", weight: '700',
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#3b6fd9', link: '#2f9e44' },
        mark: (c) => `<svg class="mark" width="48" height="36" viewBox="0 0 48 36" aria-hidden="true">
          <circle cx="14" cy="18" r="7" fill="${c.ring}" opacity="0.85"/>
          <circle cx="34" cy="18" r="7" fill="${c.ring}" opacity="0.85"/>
          <rect x="20" y="16.5" width="8" height="3" rx="1.5" fill="${c.link}"/>
        </svg>`
      },
      {
        id: 7, name: '07 — Dashed handshake', note: 'Dotted link · Manrope',
        font: "'Manrope', sans-serif", weight: '700',
        dark: { bg: '#0d1117', word: '#e6edf3', ring: '#58a6ff', link: '#3fb950' },
        light: { bg: '#ffffff', word: '#1f2328', ring: '#0969da', link: '#1a7f37' },
        mark: (c) => `<svg class="mark" width="52" height="36" viewBox="0 0 52 36" aria-hidden="true">
          <circle cx="14" cy="18" r="8" fill="none" stroke="${c.ring}" stroke-width="2"/>
          <circle cx="38" cy="18" r="8" fill="none" stroke="${c.ring}" stroke-width="2"/>
          <line x1="22" y1="18" x2="30" y2="18" stroke="${c.link}" stroke-width="2" stroke-dasharray="3 3" stroke-linecap="round"/>
        </svg>`
      },
      {
        id: 8, name: '08 — Overlap (Venn)', note: 'Shared middle · mutual consent',
        font: "'Syne', sans-serif", weight: '700', size: '1.5rem',
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66', blend: '#8bafd4' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#3b6fd9', link: '#2f9e44', blend: '#7ba3e8' },
        mark: (c) => `<svg class="mark" width="44" height="36" viewBox="0 0 44 36" aria-hidden="true">
          <circle cx="16" cy="18" r="9" fill="${c.ring}" opacity="0.35"/>
          <circle cx="28" cy="18" r="9" fill="${c.ring}" opacity="0.35"/>
          <circle cx="16" cy="18" r="9" fill="none" stroke="${c.ring}" stroke-width="2"/>
          <circle cx="28" cy="18" r="9" fill="none" stroke="${c.ring}" stroke-width="2"/>
          <circle cx="22" cy="18" r="2.5" fill="${c.link}"/>
        </svg>`
      },
      {
        id: 9, name: '09 — Stacked', note: 'Mark above word · Sora',
        font: "'Sora', sans-serif", weight: '600', size: '1.35rem', dir: 'column', gap: '0.45rem',
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#3b6fd9', link: '#2f9e44' },
        mark: (c) => baseMark(c)
      },
      {
        id: 10, name: '10 — Double arrow', note: 'Bidirectional P2P · IBM Plex',
        font: "'IBM Plex Sans', sans-serif", weight: '600',
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#3b6fd9', link: '#2f9e44' },
        mark: (c) => `<svg class="mark" width="50" height="36" viewBox="0 0 50 36" aria-hidden="true">
          <circle cx="13" cy="18" r="7.5" fill="none" stroke="${c.ring}" stroke-width="2"/>
          <circle cx="37" cy="18" r="7.5" fill="none" stroke="${c.ring}" stroke-width="2"/>
          <path d="M21 18h8M24 15l3 3-3 3M27 15l-3 3 3 3" fill="none" stroke="${c.link}" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`
      },
      {
        id: 11, name: '11 — Coral & teal', note: 'Warm / cool pair · Nunito',
        font: "'Nunito', sans-serif", weight: '800', size: '1.5rem',
        dark: { bg: '#1a1214', word: '#fff5f3', ring: '#ff8a7a', link: '#4ecdc4' },
        light: { bg: '#fff9f7', word: '#2d1f1c', ring: '#e85d4c', link: '#0d9488' },
        mark: (c) => baseMark(c)
      },
      {
        id: 12, name: '12 — Violet pulse', note: 'Purple rings · amber link',
        font: "'Outfit', sans-serif", weight: '700',
        dark: { bg: '#110e18', word: '#f3efff', ring: '#a78bfa', link: '#fbbf24' },
        light: { bg: '#f8f6ff', word: '#2e1065', ring: '#7c3aed', link: '#d97706' },
        mark: (c) => baseMark(c)
      },
      {
        id: 13, name: '13 — Mint slate', note: 'Soft social · calm',
        font: "'Inter', sans-serif", weight: '600',
        dark: { bg: '#0f1419', word: '#e7f5ef', ring: '#6ee7b7', link: '#94a3b8' },
        light: { bg: '#f0fdf9', word: '#134e4a', ring: '#14b8a6', link: '#64748b' },
        mark: (c) => baseMark(c)
      },
      {
        id: 14, name: '14 — Signal red link', note: 'Rings neutral · link = live',
        font: "'DM Sans', sans-serif", weight: '700',
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#9aa0a6', link: '#ff6b6b' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#5f6368', link: '#e03131' },
        mark: (c) => baseMark(c)
      },
      {
        id: 15, name: '15 — Pill container', note: 'Word in soft capsule',
        font: "'Plus Jakarta Sans', sans-serif", weight: '700', pill: true,
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66', pillBg: '#1a1d27' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#3b6fd9', link: '#2f9e44', pillBg: '#fff' },
        mark: (c) => baseMark(c)
      },
      {
        id: 16, name: '16 — Lowercase', note: 'Friendly · modern SaaS',
        font: "'Inter', sans-serif", weight: '600', size: '1.5rem', track: '-0.03em', case: 'lowercase',
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#3b6fd9', link: '#2f9e44' },
        mark: (c) => baseMark(c)
      },
      {
        id: 17, name: '17 — Small caps', note: 'INERTIA tracked · Fraunces',
        font: "'Fraunces', serif", weight: '700', size: '1.25rem', track: '0.18em', case: 'uppercase',
        dark: { bg: '#12100e', word: '#faf6f0', ring: '#d4a574', link: '#6bcf7f' },
        light: { bg: '#faf6f0', word: '#3d3428', ring: '#b8860b', link: '#2f855a' },
        mark: (c) => baseMark(c)
      },
      {
        id: 18, name: '18 — Gradient rings', note: 'Subtle depth on nodes',
        font: "'Sora', sans-serif", weight: '700',
        dark: { bg: '#0a0c12', word: '#eef2ff', grad1: '#6c9eff', grad2: '#a78bfa', link: '#4ade80' },
        light: { bg: '#f8fafc', word: '#0f172a', grad1: '#3b82f6', grad2: '#8b5cf6', link: '#22c55e' },
        mark: (c) => `<svg class="mark" width="48" height="36" viewBox="0 0 48 36" aria-hidden="true">
          <defs>
            <linearGradient id="g${c.id}d" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="${c.grad1}"/><stop offset="100%" stop-color="${c.grad2}"/>
            </linearGradient>
          </defs>
          <circle cx="14" cy="18" r="8" fill="none" stroke="url(#g${c.id}d)" stroke-width="2"/>
          <circle cx="34" cy="18" r="8" fill="none" stroke="url(#g${c.id}d)" stroke-width="2"/>
          <line x1="22" y1="18" x2="26" y2="18" stroke="${c.link}" stroke-width="2.5" stroke-linecap="round"/>
        </svg>`
      },
      {
        id: 19, name: '19 — Rounded square nodes', note: 'Softer geometry · app icon feel',
        font: "'Nunito', sans-serif", weight: '700',
        dark: { bg: '#0f1117', word: '#e8eaed', ring: '#6c9eff', link: '#51cf66' },
        light: { bg: '#f4f6fb', word: '#1a1d27', ring: '#3b6fd9', link: '#2f9e44' },
        mark: (c) => `<svg class="mark" width="50" height="36" viewBox="0 0 50 36" aria-hidden="true">
          <rect x="4" y="10" width="16" height="16" rx="5" fill="none" stroke="${c.ring}" stroke-width="2"/>
          <rect x="30" y="10" width="16" height="16" rx="5" fill="none" stroke="${c.ring}" stroke-width="2"/>
          <line x1="20" y1="18" x2="30" y2="18" stroke="${c.link}" stroke-width="2" stroke-linecap="round"/>
        </svg>`
      },
      {
        id: 20, name: '20 — Icon-forward', note: 'Large mark · whispers word',
        font: "'Inter', sans-serif", weight: '500', size: '0.95rem', track: '0.06em', case: 'uppercase',
        dark: { bg: '#0f1117', word: '#9aa0a6', ring: '#6c9eff', link: '#51cf66', big: true },
        light: { bg: '#f4f6fb', word: '#5f6368', ring: '#3b6fd9', link: '#2f9e44', big: true },
        mark: (c) => {
          const w = c.big ? 56 : 48;
          const h = c.big ? 42 : 36;
          const scale = c.big ? 1.15 : 1;
          return `<svg class="mark" width="${w}" height="${h}" viewBox="0 0 48 36" aria-hidden="true" style="transform:scale(${scale})">
            <circle cx="14" cy="18" r="8" fill="none" stroke="${c.ring}" stroke-width="2.25"/>
            <circle cx="34" cy="18" r="8" fill="none" stroke="${c.ring}" stroke-width="2.25"/>
            <line x1="22" y1="18" x2="26" y2="18" stroke="${c.link}" stroke-width="2.5" stroke-linecap="round"/>
          </svg>`;
        }
      }
    ];

    const grid = document.getElementById('grid');

    for (const v of variations) {
      const card = document.createElement('article');
      card.className = 'card';

      const wordStyle = (pane) => `
        --font: ${v.font};
        --word-color: ${pane.word};
        --size: ${v.size ?? '1.55rem'};
        --weight: ${v.weight ?? '700'};
        --track: ${v.track ?? '-0.04em'};
        --case: ${v.case ?? 'none'};
        --dir: ${v.dir ?? 'row'};
        --gap: ${v.gap ?? '0.65rem'};
        ${v.pill ? `--pill-bg: ${pane.pillBg};` : ''}
      `;

      const renderPane = (pane, suffix) => {
        const colors = { ...pane, id: `${v.id}-${suffix}` };
        const markHtml = v.mark(colors);
        const wordClass = v.pill ? 'word pill' : 'word';
        const text = v.case === 'lowercase' ? 'inertia' : 'Inertia';
        return `
          <div class="pane" style="background:${pane.bg}">
            <div class="logo" style="${wordStyle(pane)}">
              ${markHtml}
              <span class="${wordClass}">${text}</span>
            </div>
          </div>`;
      };

      card.innerHTML = `
        <div class="meta">
          <h2>${v.name}</h2>
          <p>${v.note}</p>
        </div>
        <div class="previews">
          ${renderPane(v.dark, 'dark')}
          ${renderPane(v.light, 'light')}
        </div>
      `;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
